<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UniScope | University Intelligence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for the Search Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --primary: #2563eb;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
        }

        /* Hero Background Pattern */
        .hero-pattern {
            background-color: #ffffff;
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Top Navigation -->
    <nav class="p-4 md:p-6 max-w-7xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">U</div>
            <span class="text-xl font-bold tracking-tight text-slate-900">UniScope</span>
        </div>
        <a href="admissions.html" class="flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-full shadow-sm text-sm font-semibold text-blue-600 hover:bg-slate-50 transition-all hover:shadow-md">
            <span>📚 Admissions Guide</span>
        </a>
    </nav>

    <!-- Unified Hero Section (Based on your previous code) -->
    <header class="hero-pattern border-b border-slate-200 px-4 py-12 md:py-20">
        <div class="max-w-4xl mx-auto text-center fade-in">
            <span class="inline-block px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-full mb-4 border border-blue-100 uppercase tracking-widest">
                Verified 2024 Dataset
            </span>
            
            <h1 class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-6 leading-tight">
                University Intelligence <br>
                <span class="text-blue-600">Simplified.</span>
            </h1>
            
            <p class="text-slate-500 text-lg md:text-xl max-w-2xl mx-auto mb-10 leading-relaxed">
                Data-driven insights for competitive applicants. Explore the Top 100 Global Institutions with real-time statistics.
            </p>

            <!-- Fixed Search Wrapper -->
            <div class="relative max-w-xl mx-auto shadow-2xl rounded-2xl overflow-hidden">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa fa-search text-slate-400"></i>
                </div>
                <input type="text" id="searchInput" 
                    class="block w-full pl-12 pr-4 py-4 md:py-5 bg-white border-none text-slate-900 text-lg focus:ring-2 focus:ring-blue-500 transition-all outline-none" 
                    placeholder="Search by name, country, or program..."
                    oninput="performSearch()">
            </div>
        </div>
    </header>

    <!-- Results Section -->
    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <!-- Skeleton Loader (Hidden by default) -->
        <div id="loader" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="h-40 bg-slate-200 animate-pulse rounded-2xl"></div>
            <div class="h-40 bg-slate-200 animate-pulse rounded-2xl"></div>
            <div class="h-40 bg-slate-200 animate-pulse rounded-2xl"></div>
        </div>

        <!-- Dynamic Results Container -->
        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- JavaScript will inject cards here -->
        </div>
        
        <!-- Default State Message -->
        <div id="empty-state" class="text-center py-20">
            <p class="text-slate-400 italic">Start typing to explore universities...</p>
        </div>
    </main>

    <!-- Unified JavaScript -->
    <script>
        // Use the function name performSearch to match the input oninput
        async function performSearch() {
            const query = document.getElementById('searchInput').value;
            const resultsContainer = document.getElementById('results');
            const emptyState = document.getElementById('empty-state');
            const loader = document.getElementById('loader');

            if (query.length < 1) {
                resultsContainer.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            loader.classList.remove('hidden');

            try {
                // Fetching from your Node.js backend
                const response = await fetch(`/api/search?q=${query}`);
                const data = await response.json();
                
                renderResults(data);
            } catch (error) {
                console.error("Search failed:", error);
            } finally {
                loader.classList.add('hidden');
            }
        }

        function renderResults(universities) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            if (universities.length === 0) {
                resultsContainer.innerHTML = `<p class="col-span-full text-center text-slate-500 py-10">No institutions found matching your criteria.</p>`;
                return;
            }

            universities.forEach(uni => {
                resultsContainer.innerHTML += `
                    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl transition-all duration-300 fade-in">
                        <h3 class="text-xl font-bold text-slate-900 mb-2">${uni.name}</h3>
                        <div class="flex items-center gap-2 mb-4">
                            <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">QS Rank #${uni.qs_rank}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4 border-t border-slate-100 pt-4">
                            <div>
                                <p class="text-slate-400 text-[10px] uppercase font-bold tracking-tighter">Acceptance</p>
                                <p class="text-slate-900 font-semibold">${uni.acceptance}</p>
                            </div>
                            <div>
                                <p class="text-slate-400 text-[10px] uppercase font-bold tracking-tighter">Tuition</p>
                                <p class="text-slate-900 font-semibold">${uni.tuition}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
